name: Build CSP Emsdk
description: |
  Composite action that checks out the Connected Spaces Platform repo, builds it
  as a static Emscripten archive in the requested build type (Debug or Release),
  and installs the result to "CSP/install" (creating `include`, `bin`, and `lib`
  subdirectories) so a downstream job can `find_package(CSP)` against it.

  You need to have setup dependencies before invoking this action, specifically:
    * Emscripten 5.0.2 active on the runner with `$EMSDK` exported on PATH
      You can do this by calling `emscripten-core/setup-emsdk` with `version: 5.0.2`).
    * Conan 2.27.0 on PATH (`pip install "conan==2.27.0"`).

inputs:
  csp_branch:
    description: CSP branch to build, defaults to main.
    required: false
    default: 'main'
  build_type:
    description: Debug or Release
    required: true
    default: 'Release'

runs:
  using: composite
  steps:

    - name: Checkout connected-spaces-platform
      uses: actions/checkout@v4
      with:
        repository: magnopus-opensource/connected-spaces-platform
        path: CSP
        ref: ${{ inputs.csp_branch }}
        fetch-depth: 0 # Required for git describe to find version tags, which we need for CSP_VERSION

    # Resolve the actual commit SHA so the install cache key is pinned to commit
    # content rather than the (mutable) branch name.
    - name: Resolve CSP commit SHA
      id: csp-sha
      shell: pwsh
      working-directory: "./CSP"
      run: |
        "sha=$(git rev-parse HEAD)" >> $env:GITHUB_OUTPUT

    # If we already have a matching install tree, skip Conan, wrapper generation,
    # configure, build, and install entirely. The key includes a hash of this
    # action so a change to build flags here invalidates the cache.
    - name: Cache CSP install (restore)
      id: csp-install-cache
      uses: actions/cache/restore@v4
      with:
        path: CSP/install
        key: csp-install-emsdk-${{ inputs.build_type }}-${{ steps.csp-sha.outputs.sha }}-${{ hashFiles('.github/actions/build-csp-emsdk/action.yml') }}

    - uses: actions/setup-python@v5
      if: steps.csp-install-cache.outputs.cache-hit != 'true'
      with:
        python-version: '3.x'
        cache: pip

    # We need cl.exe on the path.
    - uses: ilammy/msvc-dev-cmd@v1
      if: steps.csp-install-cache.outputs.cache-hit != 'true'
      with:
        arch: x64

    - name: Install Conan
      if: steps.csp-install-cache.outputs.cache-hit != 'true'
      shell: pwsh
      run: pip install "conan==2.27.0"

    - name: Detect Conan build profile
      if: steps.csp-install-cache.outputs.cache-hit != 'true'
      shell: pwsh
      run: conan profile detect --force

    - name: Conan install
      if: steps.csp-install-cache.outputs.cache-hit != 'true'
      shell: pwsh
      working-directory: "./CSP"
      env:
        # CMake 4 dropped support for cmake_minimum_required(VERSION <3.5), which
        # some older transitive Conan recipes (e.g. asyncplusplus/1.2) still
        # declare.
        # If cmake 4 is on the runner, this is neccesary.
        CMAKE_POLICY_VERSION_MINIMUM: '3.5'
      run: >
        conan install .
        --profile:host=profiles/host/emscripten
        -s build_type=${{ inputs.build_type }}
        --build=missing

    - name: Install wrapper generator dependencies
      if: steps.csp-install-cache.outputs.cache-hit != 'true'
      shell: pwsh
      run: pip install chevron==0.14.0 jinja2==3.1.2

    # Run the legacy wrapper generator — its output is included directly in CSPFoundation.cpp. Should go away eventually
    - name: Run wrapper generator
      if: steps.csp-install-cache.outputs.cache-hit != 'true'
      shell: pwsh
      run: python CSP/Tools/WrapperGenerator/WrapperGenerator.py

    - name: Configure
      if: steps.csp-install-cache.outputs.cache-hit != 'true'
      shell: pwsh
      working-directory: "./CSP"
      run: cmake --preset ${{ inputs.build_type == 'Debug' && 'debug-static' || 'release-static' }}

    - name: Build
      if: steps.csp-install-cache.outputs.cache-hit != 'true'
      shell: pwsh
      working-directory: "./CSP"
      run: cmake --build --preset ${{ inputs.build_type == 'Debug' && 'debug-static' || 'release-static' }} --parallel 2

    - name: Install
      if: steps.csp-install-cache.outputs.cache-hit != 'true'
      shell: pwsh
      working-directory: "./CSP"
      run: cmake --install build/${{ inputs.build_type }} --prefix install

    # Save only on a clean build (success + we actually built) so a failed run
    # cannot poison the cache with a partial install tree.
    - name: Cache CSP install (save)
      if: success() && steps.csp-install-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: CSP/install
        key: csp-install-emsdk-${{ inputs.build_type }}-${{ steps.csp-sha.outputs.sha }}-${{ hashFiles('.github/actions/build-csp-emsdk/action.yml') }}
